name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ui-test:
    runs-on: ubuntu-latest
    steps:
      - - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - with:
      - node-version: "20"
      - run: npm install
      - run: npx playwright install --with-deps
      - run: npx playwright test --project=msedge --project=create-recorded
      - env:
          UI_URL: ${{ secrets.UI_URL }}
          VALID_UI_USERNAME: ${{ secrets.VALID_UI_USERNAME }}
          VALID_UI_PASSWORD: ${{ secrets.VALID_UI_PASSWORD }}
          INVALID_UI_USERNAME: ${{ secrets.INVALID_UI_USERNAME }}
          INVALID_UI_PASSWORD: ${{ secrets.INVALID_UI_PASSWORD }}
      - uses: actions/upload-artifact@v4
        with:
          path: ''
      - if: always()
      - with:
      - name: playwright-report-ui
      - path: playwright-report/
      - retention-days: 30
      - name: Upload HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-ui
          path: playwright-report/
          retention-days: 30
      - name: Upload failure artifacts (traces, screenshots, videos)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-ui
          path: test-results/
          retention-days: 30
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npx playwright install --with-deps
      - run: npx playwright test --project=api-tests
        env:
          API_URL: ${{ secrets.API_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          VALID_API_USERNAME: ${{ secrets.VALID_API_USERNAME }}
          VALID_API_PASSWORD: ${{ secrets.VALID_API_PASSWORD }}
          INVALID_API_USERNAME: ${{ secrets.INVALID_API_USERNAME }}
          INVALID_API_PASSWORD: ${{ secrets.INVALID_API_PASSWORD }}
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-api
          path: playwright-report/
          retention-days: 30

      - name: Upload failure artifacts (traces, screenshots, videos)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-api
          path: test-results/
          retention-days: 30